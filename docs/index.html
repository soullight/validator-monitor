<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALIDATORS — Live Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }

  /* ── header ── */
  .head { text-align: center; margin-bottom: 28px; }
  .head h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.9);
  }
  .head .subtitle {
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 3px;
    margin-top: 6px;
  }
  .head .meta {
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    margin-top: 14px;
  }

  /* ── status pill ── */
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 14px; border-radius: 20px;
    font-size: 10px; letter-spacing: 2px;
    margin: 10px 0;
  }
  .badge.ok    { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2); color: #00E676; }
  .badge.alert { background: rgba(255,80,90,0.08); border: 1px solid rgba(255,80,90,0.25); color: #FF5050; }
  .badge.unknown { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; display: inline-block;
    box-shadow: 0 0 6px currentColor;
    animation: pulse 2s ease-in-out infinite;
  }
  .dot.ok    { background: #00E676; }
  .dot.alert { background: #FF5050; }
  .dot.unknown { background: rgba(255,255,255,0.4); }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ── totals strip ── */
  .totals {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 18px 0 28px;
  }
  @media (max-width: 600px) {
    .totals { grid-template-columns: repeat(2, 1fr); }
  }
  .tot {
    padding: 14px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }
  .tot .lbl {
    font-size: 8px; letter-spacing: 2px;
    color: rgba(255,255,255,0.3); margin-bottom: 6px;
  }
  .tot .val { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .tot .sub { font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 4px; letter-spacing: 1px; }
  .tot.headline .val { font-size: 22px; color: #00E676; }
  .tot.pl-pos .val { color: #00E676; }
  .tot.pl-neg .val { color: #FF5050; }

  /* ── issues ── */
  .issues {
    margin: 0 0 22px;
    padding: 12px 16px;
    background: rgba(255,80,90,0.06);
    border-left: 3px solid #FF5050;
    border-radius: 4px;
  }
  .issues ul { margin: 0; padding-left: 18px; list-style: none; }
  .issues li { margin: 4px 0; font-size: 12px; color: rgba(255,255,255,0.85); }

  /* ── validator grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  @media (min-width: 700px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card {
    padding: 16px 18px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(255,255,255,0.18); }
  .card.bad { border-color: rgba(255,80,90,0.4); background: rgba(255,80,90,0.04); }
  .card.warn { border-color: rgba(255,200,80,0.3); background: rgba(255,200,80,0.04); }

  .card .row1 {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .card .lbl-name { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
  .card .chain {
    font-size: 8px; letter-spacing: 2px;
    padding: 2px 6px; border-radius: 3px;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.05);
  }
  .card .balance {
    font-size: 28px; font-weight: 700;
    letter-spacing: 0.5px;
    margin: 4px 0 2px;
  }
  .card .balance .unit {
    font-size: 11px; color: rgba(255,255,255,0.4);
    margin-left: 6px; letter-spacing: 2px;
  }
  .card .usd {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 10px;
  }
  .card .rewards {
    font-size: 11px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .card .rewards.pos { color: #00E676; }
  .card .rewards.neg { color: #FF5050; }
  .card .status {
    font-size: 9px; letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  .card .status.ok { color: #00E676; }
  .card .status.warn { color: #FFCC66; }
  .card .status.bad { color: #FF5050; }
  .card a { color: rgba(255,255,255,0.35); font-size: 9px; letter-spacing: 1px; text-decoration: none; }
  .card a:hover { color: rgba(255,255,255,0.7); }

  /* ── footer ── */
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 8px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 2px;
  }
  .err {
    color: #FF5050;
    margin-top: 18px;
    text-align: center;
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <h1>VALIDATORS</h1>
    <div class="subtitle">LIVE STATUS · ETHEREUM · LUKSO</div>
    <div class="meta" id="checked-at">LOADING</div>
  </div>

  <div style="text-align:center;">
    <span id="badge" class="badge unknown"><span class="dot unknown"></span><span id="badge-text">CHECKING</span></span>
  </div>

  <div class="totals" id="totals"></div>

  <div id="issues-wrap"></div>

  <div class="grid" id="grid"></div>

  <div class="err" id="err"></div>

  <div class="footer">
    PUBLICNODE.COM · LUKSO EXPLORER · COINGECKO &nbsp; · &nbsp; HOURLY GITHUB ACTION · AUTO-REFRESH 5 MIN &nbsp; · &nbsp; <a href="state.json" style="color:rgba(255,255,255,0.18);">RAW STATE</a>
  </div>

</div>

<script>
function $(s) { return document.querySelector(s); }
function el(tag, cls, html) { const n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; }
function usd(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
}
function signed(n) {
  if (n == null) return '—';
  const v = Number(n);
  const sign = v >= 0 ? '+' : '';
  return sign + v.toLocaleString('en-US', { maximumFractionDigits: 4 });
}

async function load() {
  let s;
  try {
    const r = await fetch('state.json?ts=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('state.json HTTP ' + r.status);
    s = await r.json();
  } catch (e) {
    $('#err').textContent = 'Could not load state.json: ' + e.message + ' (watchdog may not have produced a state file yet, or Pages is warming up).';
    return;
  }

  $('#checked-at').textContent = 'LAST CHECK · ' + (s.checked_at_human || s.checked_at || 'unknown');

  const badge = $('#badge'), badgeDot = badge.querySelector('.dot'), badgeText = $('#badge-text');
  if (s.status === 'ok') {
    badge.className = 'badge ok'; badgeDot.className = 'dot ok';
    badgeText.textContent = 'ALL CLEAR';
  } else if (s.status === 'alert') {
    badge.className = 'badge alert'; badgeDot.className = 'dot alert';
    const n = (s.issues || []).length;
    badgeText.textContent = n + ' ISSUE' + (n === 1 ? '' : 'S');
  } else {
    badge.className = 'badge unknown'; badgeDot.className = 'dot unknown';
    badgeText.textContent = s.status || 'UNKNOWN';
  }

  // ── Totals strip ──
  const t = s.totals || {};
  const totalsEl = $('#totals');
  totalsEl.innerHTML = '';

  totalsEl.appendChild(el('div', 'tot headline',
    '<div class="lbl">TOTAL VALUE</div>' +
    '<div class="val">' + usd(t.value_usd) + '</div>' +
    '<div class="sub">' + (t.validators || 0) + ' VALIDATORS</div>'
  ));

  const rewClass = (t.rewards_usd || 0) >= 0 ? 'pl-pos' : 'pl-neg';
  totalsEl.appendChild(el('div', 'tot ' + rewClass,
    '<div class="lbl">BALANCE Δ</div>' +
    '<div class="val">' + (t.rewards_usd >= 0 ? '+' : '') + usd(t.rewards_usd).replace('$', '$') + '</div>' +
    '<div class="sub">vs 32.0 BASELINE</div>'
  ));

  totalsEl.appendChild(el('div', 'tot',
    '<div class="lbl">ETH STAKED</div>' +
    '<div class="val">' + (t.eth_balance != null ? Number(t.eth_balance).toFixed(3) : '—') + '</div>' +
    '<div class="sub">' + (t.eth_count || 0) + ' VALIDATORS · ' + (s.prices && s.prices.eth_usd ? '$' + Number(s.prices.eth_usd).toFixed(0) + '/ETH' : '') + '</div>'
  ));

  totalsEl.appendChild(el('div', 'tot',
    '<div class="lbl">LYX STAKED</div>' +
    '<div class="val">' + (t.lyx_balance != null ? Number(t.lyx_balance).toFixed(3) : '—') + '</div>' +
    '<div class="sub">' + (t.lukso_count || 0) + ' VALIDATORS · ' + (s.prices && s.prices.lyx_usd ? '$' + Number(s.prices.lyx_usd).toFixed(3) + '/LYX' : '') + '</div>'
  ));

  // ── Issues ──
  const issuesWrap = $('#issues-wrap');
  issuesWrap.innerHTML = '';
  if (s.issues && s.issues.length) {
    const box = el('div', 'issues');
    const ul = el('ul');
    s.issues.forEach(i => ul.appendChild(el('li', null, i.replace(/[`*]/g, ''))));
    box.appendChild(ul);
    issuesWrap.appendChild(box);
  }

  // ── Validator cards ──
  const grid = $('#grid');
  grid.innerHTML = '';
  (s.validators || []).forEach(v => {
    const slashed = v.slashed;
    const statusOk = ['active_online', 'active_ongoing'].includes(v.status);
    let cardCls = 'card';
    let statusCls = 'status ok';
    if (slashed) { cardCls += ' bad'; statusCls = 'status bad'; }
    else if (!statusOk) { cardCls += ' warn'; statusCls = 'status warn'; }

    const rewardsCls = (v.rewards || 0) >= 0 ? 'rewards pos' : 'rewards neg';
    const card = el('div', cardCls);

    card.innerHTML =
      '<div class="row1">' +
        '<span class="lbl-name">' + (v.label || ('validator ' + v.index)) + '</span>' +
        '<span class="chain">' + (v.chain || '').toUpperCase() + '</span>' +
      '</div>' +
      '<div class="balance">' + Number(v.balance).toFixed(4) +
        '<span class="unit">' + (v.balance_unit || '') + '</span></div>' +
      '<div class="usd">' + usd(v.value_usd) + '</div>' +
      '<div class="' + rewardsCls + '">' +
        signed(v.rewards) + ' ' + (v.balance_unit || '') +
        ' &nbsp;·&nbsp; ' +
        (v.rewards_usd >= 0 ? '+' : '') + usd(v.rewards_usd).replace('$', '$') +
      '</div>' +
      '<div class="' + statusCls + '">' + (slashed ? '⚠ SLASHED' : v.status || 'unknown') + '</div>' +
      '<div style="margin-top:8px;">' +
        '<a href="' + (v.explorer_url || '#') + '" target="_blank" rel="noopener">EXPLORER →</a>' +
      '</div>';
    grid.appendChild(card);
  });
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
