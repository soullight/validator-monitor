<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Validator status</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0e1014;
    --card: #161922;
    --border: #262b38;
    --text: #e6e8ef;
    --dim: #8a91a3;
    --green: #5cf08c;
    --amber: #f0c059;
    --red: #f06070;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 32px 24px; font-family: -apple-system, BlinkMacSystemFont, "SF Mono", Menlo, monospace;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 6px; letter-spacing: 0.02em; }
  .meta { color: var(--dim); font-size: 13px; margin-bottom: 4px; }
  .meta a { color: var(--dim); }
  .summary {
    display: inline-block; margin: 14px 0 24px; padding: 6px 12px;
    border-radius: 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .summary.ok { background: rgba(92,240,140,0.12); color: var(--green); border: 1px solid rgba(92,240,140,0.3); }
  .summary.alert { background: rgba(240,96,112,0.12); color: var(--red); border: 1px solid rgba(240,96,112,0.3); }
  .summary.unknown { background: rgba(138,145,163,0.12); color: var(--dim); border: 1px solid rgba(138,145,163,0.3); }
  .issues { background: rgba(240,96,112,0.06); border-left: 3px solid var(--red); padding: 12px 16px; margin: 0 0 24px; border-radius: 4px; }
  .issues ul { margin: 0; padding-left: 18px; }
  .issues li { margin: 4px 0; font-size: 14px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px;
  }
  .label { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
  .chain { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); }
  .status { font-size: 13px; margin: 2px 0; }
  .status.ok { color: var(--green); }
  .status.warn { color: var(--amber); }
  .status.bad { color: var(--red); }
  .balance { font-size: 22px; font-weight: 600; margin: 8px 0 2px; }
  .balance .unit { font-size: 13px; color: var(--dim); margin-left: 4px; }
  .sub { font-size: 11px; color: var(--dim); }
  .footer { margin-top: 32px; font-size: 12px; color: var(--dim); }
  .footer code { background: var(--card); padding: 2px 6px; border-radius: 3px; }
  .err { color: var(--red); margin-top: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Validator status</h1>
  <div class="meta" id="checked-at">loading…</div>
  <div class="summary unknown" id="summary">checking…</div>
  <div id="issues-wrap"></div>
  <div class="grid" id="grid"></div>
  <div class="err" id="err"></div>
  <div class="footer">
    Auto-refreshes every 5 min. Hourly cron writes <code>docs/state.json</code> from a GitHub Action.
    Source: <a href="state.json" style="color:var(--dim);">state.json</a>.
  </div>
</div>

<script>
async function load() {
  try {
    const r = await fetch('state.json?ts=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('state.json HTTP ' + r.status);
    const s = await r.json();

    document.getElementById('checked-at').textContent =
      'Last check: ' + (s.checked_at_human || s.checked_at || 'unknown');

    const sum = document.getElementById('summary');
    if (s.status === 'ok') { sum.className = 'summary ok'; sum.textContent = 'All clear'; }
    else if (s.status === 'alert') { sum.className = 'summary alert'; sum.textContent = (s.issues || []).length + ' issue' + ((s.issues || []).length === 1 ? '' : 's'); }
    else { sum.className = 'summary unknown'; sum.textContent = s.status || 'unknown'; }

    const issuesWrap = document.getElementById('issues-wrap');
    issuesWrap.innerHTML = '';
    if (s.issues && s.issues.length) {
      const div = document.createElement('div');
      div.className = 'issues';
      const ul = document.createElement('ul');
      s.issues.forEach(i => {
        const li = document.createElement('li');
        li.textContent = i.replace(/[`*]/g, '');
        ul.appendChild(li);
      });
      div.appendChild(ul);
      issuesWrap.appendChild(div);
    }

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    (s.validators || []).forEach(v => {
      const card = document.createElement('div');
      card.className = 'card';
      const balKey = v.chain === 'lukso' ? 'balance_lyx' : 'balance_eth';
      const unit = v.chain === 'lukso' ? 'LYX' : 'ETH';
      const bal = v[balKey] != null ? Number(v[balKey]).toFixed(3) : '?';

      let statusClass = 'ok';
      let statusText = v.status || 'unknown';
      if (v.slashed) { statusClass = 'bad'; statusText = 'SLASHED'; }
      else if (statusText.indexOf('active') !== 0 && statusText !== 'active_online') { statusClass = 'warn'; }

      card.innerHTML = '<div class="label">' +
        '<span>' + (v.label || v.index || 'validator') + '</span>' +
        '<span class="chain">' + (v.chain || '') + '</span></div>' +
        '<div class="status ' + statusClass + '">' + statusText + '</div>' +
        '<div class="balance">' + bal + '<span class="unit">' + unit + '</span></div>' +
        (v.index ? '<div class="sub"><a style="color:var(--dim);" href="https://beaconcha.in/validator/' + v.index + '">beaconcha.in →</a></div>' : '');
      grid.appendChild(card);
    });
  } catch (e) {
    document.getElementById('err').textContent = 'Could not load state.json: ' + e.message +
      ' (the watchdog has not produced a state file yet, or GitHub Pages is still warming up).';
  }
}
load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
